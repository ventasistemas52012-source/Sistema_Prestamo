{% extends "base.html" %}
{% block content %}

<h2>Editar Cronograma de {{ cliente['nombre'] }} {{ cliente['apellidos'] }}</h2>

<form method="POST" enctype="multipart/form-data">
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID Cuota</th>
                <th>Fecha Pago</th>
                <th>Monto</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            {% for cuota in cuotas %}
            <tr>
                <td>{{ cuota['id'] }}</td>
                <td>
                    <input type="date" name="fecha_{{ cuota['id'] }}" value="{{ cuota['fecha_pago'] }}">



                </td>
                <td>
                    <input type="number" step="0.01" name="monto_{{ cuota['id'] }}" value="{{ cuota['cuota'] }}">
                </td>
                <td>
                    <input type="text" value="{{ cuota.estado }}" readonly>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
    <a href="/cronograma/{{ cliente['id'] }}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>Préstamos Vencidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 class="text-danger mb-4">🔴 Préstamos Vencidos</h2>

<div class="alert alert-danger">
    Total vencidos: <strong>{{ vencidos|length }}</strong>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-danger">
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Fecha Pago</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        {% for r in vencidos %}
        <tr>
            <td>{{ r.id }}</td>
            <td>{{ r.nombre }} {{ r.apellidos }}</td>
            <td>{{ r.fecha_pago }}</td>
            <td class="text-danger fw-bold">{{ r.estado }}</td>
        </tr>
        {% endfor %}
    </tbody>

    {% if cantidad == 0 %}
    <tr>

    <td colspan="4" class="textt-center text-success">
    No hay Préstamos Vencidos
    </td>
    </tr>
    {% endif %}

</table>

<a href="/" class="btn btn-secondary mt-3">Volver</a>

</body>
</html>
